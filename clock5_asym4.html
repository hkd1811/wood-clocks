let bgImg, hourImg, minuteImg, secondImg;

async function init() {
  [bgImg, hourImg, minuteImg, secondImg] = await Promise.all([
    loadImage(bgSrc), loadImage(hourSrc), loadImage(minuteSrc), loadImage(secondSrc)
  ]);
  requestAnimationFrame(loop);
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

  const now = new Date();
  const hours = now.getHours() % 12;
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();

  const targetHourAngleDeg = (hours + minutes / 60) * 30 - 90;
  const targetMinuteAngleDeg = minutes * 6 - 90;
  const targetSecAngleDeg = seconds * 6 - 90;

  const rotHour = (targetHourAngleDeg - HOUR_BASE_ANGLE_DEG) * Math.PI / 180;
  const rotMinute = (targetMinuteAngleDeg - MINUTE_BASE_ANGLE_DEG) * Math.PI / 180;
  const rotSecond = (targetSecAngleDeg - SECOND_BASE_ANGLE_DEG) * Math.PI / 180;

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotHour);
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 4;
  const hourBaseRad = HOUR_BASE_ANGLE_DEG * Math.PI / 180;
  ctx.rotate(hourBaseRad);
  ctx.scale(1.21, 1.21); // 전체 10% 추가 확대 반영
  ctx.rotate(-hourBaseRad);
  ctx.drawImage(hourImg, -HOUR_HALF, -HOUR_HALF);
  ctx.restore();

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotMinute);
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 4;
  const minuteBaseRad = MINUTE_BASE_ANGLE_DEG * Math.PI / 180;
  ctx.rotate(minuteBaseRad);
  ctx.scale(1.1, 1.21); // 전체 10% 추가 확대 반영 (길이도 10% 커짐)
  ctx.rotate(-minuteBaseRad);
  ctx.drawImage(minuteImg, -MINUTE_HALF, -MINUTE_HALF);
  ctx.restore();

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotSecond);
  const secondBaseRad = SECOND_BASE_ANGLE_DEG * Math.PI / 180;
  ctx.rotate(secondBaseRad);
  ctx.scale(1.0, 1.1); // 폭 방향만 10% 확대
  ctx.rotate(-secondBaseRad);
  ctx.drawImage(secondImg, -SECOND_HALF, -SECOND_HALF);
  ctx.restore();

  const label = document.getElementById('timeLabel');
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = minutes.toString().padStart(2,'0');
  const ss = seconds.toString().padStart(2,'0');
  label.textContent = hh + ':' + mm + ':' + ss;
}

init();
