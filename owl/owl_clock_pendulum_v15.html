let bodyImg, tailImg, hourImg, minuteImg, secondImg;

async function init() {
  [bodyImg, tailImg, hourImg, minuteImg, secondImg] = await Promise.all([
    loadImage(bodySrc), loadImage(tailSrc), loadImage(hourSrc), loadImage(minuteSrc), loadImage(secondSrc)
  ]);
  requestAnimationFrame(loop);
}

function loop() {
  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1) 꼬리: 진자운동 (연속 부드러운 회전), 3mm 하향 반영
  const nowMs = Date.now();
  const angleDeg = PENDULUM_AMPLITUDE_DEG * Math.sin(2 * Math.PI * nowMs / PENDULUM_PERIOD_MS);
  const angleRad = angleDeg * Math.PI / 180;

  ctx.save();
  ctx.translate(0, TAIL_OFFSET_Y);
  ctx.translate(TAIL_PIVOT_X, TAIL_PIVOT_Y);
  ctx.rotate(angleRad);
  ctx.translate(-TAIL_PIVOT_X, -TAIL_PIVOT_Y);
  ctx.drawImage(tailImg, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  // 2) 몸통: 정적, 꼬리 상단부를 자연스럽게 가림
  ctx.drawImage(bodyImg, 0, 0, canvas.width, canvas.height);

  // 3) 시침/분침/초침: 틱-톡 (실시간, 1초 단위)
  const now = new Date();
  const hours = now.getHours() % 12;
  const minutes = now.getMinutes();
  const seconds = now.getSeconds();

  const targetHourAngleDeg = (hours + minutes / 60) * 30 - 90;
  const targetMinuteAngleDeg = minutes * 6 - 90;
  const targetSecAngleDeg = seconds * 6 - 90;

  const rotHour = (targetHourAngleDeg - HOUR_BASE_ANGLE_DEG) * Math.PI / 180;
  const rotMinute = (targetMinuteAngleDeg - MINUTE_BASE_ANGLE_DEG) * Math.PI / 180;
  const rotSecond = (targetSecAngleDeg - SECOND_BASE_ANGLE_DEG) * Math.PI / 180;

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotHour);
  ctx.drawImage(hourImg, -HOUR_HALF, -HOUR_HALF);
  ctx.restore();

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotMinute);
  ctx.drawImage(minuteImg, -MINUTE_HALF, -MINUTE_HALF);
  ctx.restore();

  ctx.save();
  ctx.translate(PIN_X, PIN_Y);
  ctx.rotate(rotSecond);
  ctx.drawImage(secondImg, -SECOND_HALF, -SECOND_HALF);
  ctx.restore();

  const label = document.getElementById('timeLabel');
  const hh = now.getHours().toString().padStart(2,'0');
  const mm = minutes.toString().padStart(2,'0');
  const ss = seconds.toString().padStart(2,'0');
  label.textContent = hh + ':' + mm + ':' + ss;
}

init();
</script>
</body>
</html>
